<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>农药知识库</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --green: #2E7D32;
    --green-light: #E8F5E9;
    --amber: #F57F17;
    --bg: #F4F6F4;
    --border: #E0E0E0;
  }
  body { background: var(--bg); font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }

  /* 标签按钮通用样式 */
  .tag-btn {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 5px 14px; border-radius: 4px; cursor: pointer; user-select: none;
    font-size: 13px; border: 1px solid #DDD; background: #F5F5F5; color: #555;
    transition: all .15s;
  }
  .tag-btn:hover { border-color: var(--green); color: var(--green); }
  .tag-btn.selected {
    background: var(--green-light); color: var(--green);
    border: 2px solid var(--green); font-weight: 500;
  }
  .tag-btn.disabled { background: #FAFAFA; color: #BDBDBD; border-color: #EEEEEE; cursor: default; pointer-events: none; }

  /* 面包屑导航 */
  .breadcrumb { font-size: 12px; color: #888; }
  .breadcrumb span { color: var(--green); font-weight: 500; }

  /* 产品表格 */
  .product-table th { background: #F0F4F0; font-weight: 600; color: #333; font-size: 13px; }
  .product-table td { font-size: 13px; vertical-align: top; }
  .product-table tr:hover td { background: #F9FBF9; }

  /* 高亮标签（已选中的作物/防治对象在结果中高亮显示） */
  .tag-hi { background: var(--green-light); color: var(--green); border: 1px solid var(--green); font-weight: 500; }
  .tag-normal { background: #F5F5F5; color: #555; border: 1px solid #DDD; }
  .tag-item { display: inline-block; padding: 2px 10px; border-radius: 3px; font-size: 12px; margin: 2px; }

  /* 弹层 */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 50; display: flex; align-items: center; justify-content: center; }
  .modal-box { background: #fff; border-radius: 8px; width: 600px; max-height: 80vh; overflow-y: auto; padding: 24px; position: relative; }

  /* 搜索框 */
  .search-input { width: 100%; padding: 8px 14px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; outline: none; }
  .search-input:focus { border-color: var(--green); box-shadow: 0 0 0 2px #c8e6c9; }

  /* 侧边栏 */
  .sidebar { position: sticky; top: 72px; }

  /* 分步骤区域标题 */
  .step-label { font-size: 12px; color: #888; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .step-num { width: 18px; height: 18px; border-radius: 50%; background: var(--green); color: #fff; font-size: 11px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }

  /* 展开/收起按钮 */
  .expand-btn { font-size: 12px; color: var(--green); cursor: pointer; }
  .expand-btn:hover { text-decoration: underline; }
</style>
</head>
<body>

<!-- ── 顶部导航 ─────────────────────────────────────────────────────────── -->
<header class="bg-white border-b border-gray-200 h-14 flex items-center px-6 sticky top-0 z-40 shadow-sm">
  <span class="text-green-800 font-bold text-lg">🌿 农药知识库</span>
  <div class="flex-1 mx-8">
    <input id="searchInput" type="text" placeholder="直接搜索农药名 / 有效成分 / 防治对象 ..." class="search-input" style="max-width:520px">
  </div>
  <a href="/manage" class="text-sm text-gray-500 hover:text-green-700">管理后台 →</a>
</header>

<!-- ── 主体布局：左侧筛选 + 右侧摘要侧边栏 ─────────────────────────────── -->
<div class="max-w-screen-xl mx-auto px-6 py-4 flex gap-4">

  <!-- 左侧主区域（80%） -->
  <div class="flex-1 min-w-0">

    <!-- 面包屑 -->
    <div id="breadcrumb" class="breadcrumb mb-3 h-5"></div>

    <!-- 步骤一：选大类 -->
    <div class="bg-white rounded-lg p-4 mb-3 shadow-sm">
      <div class="step-label"><span class="step-num">1</span> 选择品类</div>
      <div id="step1Btns" class="flex flex-wrap gap-2"></div>
    </div>

    <!-- 步骤二：选子类（仅在一级有子分类时显示） -->
    <div id="step2Wrap" class="bg-white rounded-lg p-4 mb-3 shadow-sm hidden">
      <div class="step-label"><span class="step-num">2</span> 选择子类</div>
      <div id="step2Btns" class="flex flex-wrap gap-2"></div>
    </div>

    <!-- 步骤三：选作物/场所（动态加载） -->
    <div id="step3Wrap" class="bg-white rounded-lg p-4 mb-3 shadow-sm hidden">
      <div class="step-label"><span class="step-num" id="step3Num">3</span> 选择作物 / 场所 <span class="text-xs text-gray-400">（可多选，OR 逻辑）</span></div>
      <div id="step3Btns" class="flex flex-wrap gap-2"></div>
    </div>

    <!-- 步骤四：选防治对象（动态加载） -->
    <div id="step4Wrap" class="bg-white rounded-lg p-4 mb-3 shadow-sm hidden">
      <div id="step4Num" class="step-label"><span class="step-num">4</span> 选择防治对象 <span class="text-xs text-gray-400">（可多选，OR 逻辑）</span></div>
      <div id="step4Btns" class=""></div>
    </div>

    <!-- 查询结果区 -->
    <div id="resultWrap" class="bg-white rounded-lg shadow-sm overflow-hidden">
      <div id="resultHeader" class="px-4 py-3 border-b border-gray-100 flex items-center justify-between">
        <span id="resultCount" class="text-sm text-gray-600">请从上方选择筛选条件</span>
        <div id="pagination" class="flex items-center gap-2"></div>
      </div>
      <div id="resultBody">
        <div class="text-center py-16 text-gray-400 text-sm">请选择品类后查询</div>
      </div>
    </div>

  </div>

  <!-- 右侧摘要侧边栏（20%） -->
  <div class="w-52 flex-shrink-0">
    <div class="sidebar bg-white rounded-lg shadow-sm p-4">
      <div class="text-xs font-semibold text-gray-500 mb-3">当前筛选</div>
      <div id="sidebarSummary" class="text-xs text-gray-400">未选择任何条件</div>
      <button id="clearBtn" class="mt-4 w-full text-xs text-gray-500 border border-gray-200 rounded py-1.5 hover:border-red-300 hover:text-red-500 transition hidden">清空筛选</button>
    </div>
  </div>

</div>

<!-- ── 产品详情弹层 ─────────────────────────────────────────────────────── -->
<div id="modalOverlay" class="modal-overlay hidden">
  <div class="modal-box">
    <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-700 text-xl">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// 状态管理：所有筛选状态集中在此对象，避免散落各处
// ═══════════════════════════════════════════════════════════════════════════
const state = {
  categoryTree: [],          // 完整分类树（首次加载后缓存）
  selectedCatL1: null,       // 选中的一级分类 {id, name, children}
  selectedCatL2: null,       // 选中的二级分类（没有子分类时为 null）
  selectedCropIDs: new Set(), // 已选作物 id 集合
  selectedTargetIDs: new Set(), // 已选防治对象 id 集合
  keyword: '',               // 搜索关键词
  page: 1,
  pageSize: 30,
  total: 0,
};

// ═══════════════════════════════════════════════════════════════════════════
// API 工具函数
// ═══════════════════════════════════════════════════════════════════════════

/** get 发送 GET 请求并返回 data 字段，失败时 throw 错误消息 */
async function get(url) {
  const res = await fetch(url);
  const json = await res.json();
  if (json.code !== 0) throw new Error(json.msg);
  return json.data;
}

// ═══════════════════════════════════════════════════════════════════════════
// 初始化：加载分类树，渲染步骤一按钮
// ═══════════════════════════════════════════════════════════════════════════
async function init() {
  try {
    state.categoryTree = await get('/api/categories');
    renderStep1();
  } catch(e) {
    document.getElementById('step1Btns').innerHTML = '<span class="text-red-500 text-sm">加载分类失败：' + e.message + '</span>';
  }
}

/** renderStep1 渲染一级分类按钮（除草/杀虫/杀菌...） */
function renderStep1() {
  const container = document.getElementById('step1Btns');
  container.innerHTML = '';
  state.categoryTree.forEach(cat => {
    const btn = makeTagBtn(cat.name, state.selectedCatL1?.id === cat.id, () => {
      if (state.selectedCatL1?.id === cat.id) {
        // 再次点击取消
        state.selectedCatL1 = null;
      } else {
        state.selectedCatL1 = cat;
      }
      // 重置下游状态
      state.selectedCatL2 = null;
      state.selectedCropIDs.clear();
      state.selectedTargetIDs.clear();
      state.page = 1;
      renderStep1();
      renderStep2();
    });
    container.appendChild(btn);
  });
}

/** renderStep2 根据一级分类是否有子分类，显示/隐藏步骤二 */
function renderStep2() {
  const wrap = document.getElementById('step2Wrap');
  const container = document.getElementById('step2Btns');

  if (!state.selectedCatL1 || !state.selectedCatL1.children?.length) {
    wrap.classList.add('hidden');
    // 直接进入步骤三
    loadAndRenderStep3();
    return;
  }

  wrap.classList.remove('hidden');
  container.innerHTML = '';
  state.selectedCatL1.children.forEach(cat => {
    const btn = makeTagBtn(cat.name, state.selectedCatL2?.id === cat.id, () => {
      if (state.selectedCatL2?.id === cat.id) {
        state.selectedCatL2 = null;
      } else {
        state.selectedCatL2 = cat;
      }
      state.selectedCropIDs.clear();
      state.selectedTargetIDs.clear();
      state.page = 1;
      renderStep2();
      loadAndRenderStep3();
    });
    container.appendChild(btn);
  });

  // 步骤二渲染完，加载步骤三
  loadAndRenderStep3();
}

/** loadAndRenderStep3 加载当前分类下有产品的作物列表并渲染按钮 */
async function loadAndRenderStep3() {
  const wrap = document.getElementById('step3Wrap');
  // 有效分类 = 二级 > 一级
  const catID = state.selectedCatL2?.id || state.selectedCatL1?.id || 0;

  if (!catID) {
    wrap.classList.add('hidden');
    document.getElementById('step4Wrap').classList.add('hidden');
    renderResult();
    return;
  }

  wrap.classList.remove('hidden');
  // 更新步骤编号（有子分类时是第3步，无子分类时也是第2步显示为3）
  const stepNum = state.selectedCatL1?.children?.length ? 3 : 2;
  document.getElementById('step3Num').textContent = stepNum;

  const container = document.getElementById('step3Btns');
  container.innerHTML = '<span class="text-xs text-gray-400">加载中...</span>';

  try {
    const crops = await get('/api/filter/crops?category_id=' + catID);
    container.innerHTML = '';
    if (!crops.length) {
      container.innerHTML = '<span class="text-xs text-gray-400">该分类暂无作物数据</span>';
    }
    renderTagGroup(container, crops, state.selectedCropIDs, (id, selected) => {
      if (selected) state.selectedCropIDs.add(id);
      else state.selectedCropIDs.delete(id);
      state.page = 1;
      loadAndRenderStep4();
    });
  } catch(e) {
    container.innerHTML = '<span class="text-red-500 text-sm">加载失败</span>';
  }

  loadAndRenderStep4();
}

/** loadAndRenderStep4 加载当前条件下有产品的防治对象列表并渲染（按类型分组） */
async function loadAndRenderStep4() {
  const wrap = document.getElementById('step4Wrap');
  const catID = state.selectedCatL2?.id || state.selectedCatL1?.id || 0;
  if (!catID) {
    wrap.classList.add('hidden');
    renderResult();
    return;
  }

  wrap.classList.remove('hidden');
  const container = document.getElementById('step4Btns');
  container.innerHTML = '<span class="text-xs text-gray-400">加载中...</span>';

  const cropParam = [...state.selectedCropIDs].join(',');
  const url = '/api/filter/targets?category_id=' + catID + (cropParam ? '&crop_ids=' + cropParam : '');

  try {
    const targets = await get(url);
    container.innerHTML = '';

    if (!targets.length) {
      container.innerHTML = '<span class="text-xs text-gray-400">该条件暂无防治对象数据</span>';
      renderResult();
      return;
    }

    // 按类型分组：weed / pest / disease
    const groups = { weed: [], pest: [], disease: [] };
    const typeLabel = { weed: '杂草', pest: '害虫', disease: '病害' };
    targets.forEach(t => {
      if (groups[t.type]) groups[t.type].push(t);
    });

    // 删除不在新列表中的已选目标（动态过滤，防止选了当前无效的目标）
    const validIDs = new Set(targets.map(t => t.id));
    state.selectedTargetIDs.forEach(id => {
      if (!validIDs.has(id)) state.selectedTargetIDs.delete(id);
    });

    ['weed', 'pest', 'disease'].forEach(type => {
      if (!groups[type].length) return;
      const groupDiv = document.createElement('div');
      groupDiv.className = 'mb-3';
      const label = document.createElement('div');
      label.className = 'text-xs text-gray-500 mb-1.5 font-medium';
      label.textContent = '▪ ' + typeLabel[type];
      groupDiv.appendChild(label);
      const btnWrap = document.createElement('div');
      btnWrap.className = 'flex flex-wrap gap-1.5';
      renderTagGroup(btnWrap, groups[type], state.selectedTargetIDs, (id, selected) => {
        if (selected) state.selectedTargetIDs.add(id);
        else state.selectedTargetIDs.delete(id);
        state.page = 1;
        renderResult();
        updateBreadcrumb();
        updateSidebar();
      });
      groupDiv.appendChild(btnWrap);
      container.appendChild(groupDiv);
    });
  } catch(e) {
    container.innerHTML = '<span class="text-red-500 text-sm">加载失败</span>';
  }

  renderResult();
  updateBreadcrumb();
  updateSidebar();
}

// ═══════════════════════════════════════════════════════════════════════════
// 产品列表渲染
// ═══════════════════════════════════════════════════════════════════════════

/** renderResult 根据当前 state 查询产品并渲染到结果区 */
async function renderResult() {
  updateBreadcrumb();
  updateSidebar();

  const catID = state.selectedCatL2?.id || state.selectedCatL1?.id || 0;
  const keyword = state.keyword.trim();

  // 没有任何筛选条件时不查询
  if (!catID && !keyword && !state.selectedCropIDs.size && !state.selectedTargetIDs.size) {
    document.getElementById('resultBody').innerHTML = '<div class="text-center py-16 text-gray-400 text-sm">请选择品类后查询</div>';
    document.getElementById('resultCount').textContent = '请从上方选择筛选条件';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const params = new URLSearchParams({
    is_active: '1',
    page: state.page,
    page_size: state.pageSize,
  });
  if (catID) params.set('category_id', catID);
  if (keyword) params.set('keyword', keyword);
  if (state.selectedCropIDs.size) params.set('crop_ids', [...state.selectedCropIDs].join(','));
  if (state.selectedTargetIDs.size) params.set('target_ids', [...state.selectedTargetIDs].join(','));

  document.getElementById('resultBody').innerHTML = '<div class="text-center py-8 text-gray-400 text-sm">查询中...</div>';

  try {
    const data = await get('/api/products?' + params.toString());
    state.total = data.total;
    document.getElementById('resultCount').textContent =
      '共 ' + data.total + ' 个产品' + (state.page > 1 ? '，第 ' + state.page + ' 页' : '');
    renderProductTable(data.list);
    renderPagination();
  } catch(e) {
    document.getElementById('resultBody').innerHTML = '<div class="text-center py-8 text-red-400 text-sm">查询失败：' + e.message + '</div>';
  }
}

/** renderProductTable 将产品列表渲染成表格 */
function renderProductTable(list) {
  if (!list.length) {
    document.getElementById('resultBody').innerHTML = '<div class="text-center py-16 text-gray-400 text-sm">当前条件下没有匹配的产品</div>';
    return;
  }

  const rows = list.map(p => {
    const cropTags = (p.crops || []).map(c => {
      const hi = state.selectedCropIDs.has(c.id);
      return `<span class="tag-item ${hi ? 'tag-hi' : 'tag-normal'}">${esc(c.name)}</span>`;
    }).join('');
    const tgtTags = (p.targets || []).map(t => {
      const hi = state.selectedTargetIDs.has(t.id);
      return `<span class="tag-item ${hi ? 'tag-hi' : 'tag-normal'}">${esc(t.name)}</span>`;
    }).join('');

    return `<tr class="border-b border-gray-100">
      <td class="px-4 py-3 font-medium text-gray-800 w-1/4">${esc(p.name)}<br><span class="text-xs text-gray-400">${esc(p.category_name)}</span></td>
      <td class="px-3 py-3 text-gray-600 w-[10%] whitespace-nowrap">${esc(p.dosage)}</td>
      <td class="px-3 py-3 w-[30%]">${cropTags || '<span class="text-gray-300 text-xs">—</span>'}</td>
      <td class="px-3 py-3 w-[30%]">${tgtTags || '<span class="text-gray-300 text-xs">—</span>'}</td>
      <td class="px-3 py-3 w-[5%] text-center">
        <button onclick="showDetail(${p.id})" class="text-xs text-green-700 border border-green-300 rounded px-2 py-1 hover:bg-green-50">详情</button>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('resultBody').innerHTML = `
    <table class="product-table w-full border-collapse">
      <thead>
        <tr class="border-b border-gray-200">
          <th class="px-4 py-2.5 text-left">产品名称</th>
          <th class="px-3 py-2.5 text-left">用量</th>
          <th class="px-3 py-2.5 text-left">适用作物/场所</th>
          <th class="px-3 py-2.5 text-left">防治对象</th>
          <th class="px-3 py-2.5 text-center">操作</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

/** renderPagination 渲染分页控件 */
function renderPagination() {
  const totalPages = Math.ceil(state.total / state.pageSize);
  if (totalPages <= 1) {
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  let html = '';
  const p = state.page;
  if (p > 1) html += `<button onclick="goPage(${p-1})" class="text-xs px-2 py-1 border rounded hover:bg-gray-50">‹ 上一页</button>`;
  html += `<span class="text-xs text-gray-500">${p} / ${totalPages}</span>`;
  if (p < totalPages) html += `<button onclick="goPage(${p+1})" class="text-xs px-2 py-1 border rounded hover:bg-gray-50">下一页 ›</button>`;
  document.getElementById('pagination').innerHTML = html;
}

/** goPage 跳转到指定页码 */
function goPage(page) {
  state.page = page;
  renderResult();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════════════════════════════════════════════════════════════════════════
// 产品详情弹层
// ═══════════════════════════════════════════════════════════════════════════

/** showDetail 加载并展示产品详情弹层 */
async function showDetail(id) {
  document.getElementById('modalContent').innerHTML = '<div class="text-center py-8 text-gray-400">加载中...</div>';
  document.getElementById('modalOverlay').classList.remove('hidden');

  try {
    const p = await get('/api/products/' + id);
    const cropTags = (p.crops || []).map(c =>
      `<span class="tag-item tag-normal">${esc(c.name)}</span>`).join('');
    const tgtGroups = {};
    const typeLabel = { weed: '杂草', pest: '害虫', disease: '病害' };
    (p.targets || []).forEach(t => {
      if (!tgtGroups[t.type]) tgtGroups[t.type] = [];
      tgtGroups[t.type].push(t);
    });
    const tgtHtml = Object.entries(tgtGroups).map(([type, ts]) =>
      `<div class="mb-1"><span class="text-xs text-gray-500">${typeLabel[type] || type}：</span>${
        ts.map(t => `<span class="tag-item tag-normal">${esc(t.name)}</span>`).join('')
      }</div>`
    ).join('');

    document.getElementById('modalContent').innerHTML = `
      <h3 class="text-base font-bold text-gray-800 mb-1">${esc(p.name)}</h3>
      <p class="text-xs text-gray-400 mb-4">${esc(p.category_name)}</p>
      <table class="w-full text-sm mb-3">
        <tr class="border-b"><td class="py-2 text-gray-500 w-20">用量</td><td class="py-2 font-medium">${esc(p.dosage) || '—'}</td></tr>
      </table>
      <div class="mb-3">
        <div class="text-xs text-gray-500 mb-1.5 font-medium">适用作物/场所</div>
        <div>${cropTags || '<span class="text-xs text-gray-300">暂无数据</span>'}</div>
      </div>
      <div class="mb-3">
        <div class="text-xs text-gray-500 mb-1.5 font-medium">防治对象</div>
        ${tgtHtml || '<span class="text-xs text-gray-300">暂无数据</span>'}
      </div>
      ${p.usage ? `<div class="mb-3 bg-gray-50 rounded p-3">
        <div class="text-xs text-gray-500 mb-1 font-medium">使用方式</div>
        <div class="text-sm text-gray-700 leading-relaxed">${esc(p.usage).replace(/\n/g,'<br>')}</div>
      </div>` : ''}
      ${p.notes ? `<div class="bg-amber-50 border-l-4 border-amber-400 rounded p-3">
        <div class="text-xs text-amber-600 mb-1 font-medium">⚠ 注意事项</div>
        <div class="text-sm text-gray-700 leading-relaxed">${esc(p.notes).replace(/\n/g,'<br>')}</div>
      </div>` : ''}`;
  } catch(e) {
    document.getElementById('modalContent').innerHTML = '<div class="text-red-400 text-sm">加载失败：' + e.message + '</div>';
  }
}

/** closeModal 关闭详情弹层 */
function closeModal() {
  document.getElementById('modalOverlay').classList.add('hidden');
}

// ═══════════════════════════════════════════════════════════════════════════
// 面包屑 & 侧边栏更新
// ═══════════════════════════════════════════════════════════════════════════

/** updateBreadcrumb 更新顶部面包屑：当前选择路径 */
function updateBreadcrumb() {
  const parts = [];
  if (state.selectedCatL1) parts.push(state.selectedCatL1.name);
  if (state.selectedCatL2) parts.push(state.selectedCatL2.name);

  const el = document.getElementById('breadcrumb');
  if (!parts.length) { el.innerHTML = ''; return; }
  el.innerHTML = parts.map((p, i) =>
    i < parts.length - 1 ? `<span>${esc(p)}</span> <span class="text-gray-300">›</span> ` : `<span>${esc(p)}</span>`
  ).join('');
}

/** updateSidebar 更新右侧摘要：显示当前已选作物和防治对象数量 */
function updateSidebar() {
  const el = document.getElementById('sidebarSummary');
  const clearBtn = document.getElementById('clearBtn');
  const hasFilter = state.selectedCropIDs.size || state.selectedTargetIDs.size;

  if (!hasFilter) {
    el.innerHTML = '<span class="text-gray-400">未选择过滤条件</span>';
    clearBtn.classList.add('hidden');
    return;
  }

  clearBtn.classList.remove('hidden');
  let html = '';
  if (state.selectedCropIDs.size) html += `<div class="mb-1.5"><span class="text-gray-500">作物：</span><span class="text-green-700">${state.selectedCropIDs.size} 项</span></div>`;
  if (state.selectedTargetIDs.size) html += `<div><span class="text-gray-500">防治对象：</span><span class="text-green-700">${state.selectedTargetIDs.size} 项</span></div>`;
  el.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════════════════
// 工具函数
// ═══════════════════════════════════════════════════════════════════════════

/**
 * makeTagBtn 创建一个单选标签按钮元素。
 * @param {string} text 按钮显示文本
 * @param {boolean} selected 是否选中
 * @param {Function} onClick 点击回调
 */
function makeTagBtn(text, selected, onClick) {
  const btn = document.createElement('button');
  btn.className = 'tag-btn' + (selected ? ' selected' : '');
  btn.textContent = (selected ? '✓ ' : '') + text;
  btn.addEventListener('click', onClick);
  return btn;
}

/**
 * renderTagGroup 批量渲染多选标签按钮到容器中。
 * @param {HTMLElement} container 父容器
 * @param {Array} items {id, name} 列表
 * @param {Set} selectedSet 已选 id 的 Set
 * @param {Function} onChange (id, selected) => void 选中状态变化回调
 */
function renderTagGroup(container, items, selectedSet, onChange) {
  items.forEach(item => {
    const btn = document.createElement('button');
    const selected = selectedSet.has(item.id);
    btn.className = 'tag-btn' + (selected ? ' selected' : '');
    btn.textContent = (selected ? '✓ ' : '') + item.name;
    btn.addEventListener('click', () => {
      const nowSelected = !selectedSet.has(item.id);
      // 重新渲染整组（保持按钮状态同步）
      onChange(item.id, nowSelected);
      // 更新当前按钮显示
      btn.className = 'tag-btn' + (nowSelected ? ' selected' : '');
      btn.textContent = (nowSelected ? '✓ ' : '') + item.name;
    });
    container.appendChild(btn);
  });
}

/** esc HTML 转义，防止 XSS */
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════════════════════════════
// 搜索框处理（防抖）
// ═══════════════════════════════════════════════════════════════════════════
let searchTimer = null;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    state.keyword = e.target.value.trim();
    state.page = 1;
    renderResult();
  }, 350);
});

// 清空按钮
document.getElementById('clearBtn').addEventListener('click', () => {
  state.selectedCropIDs.clear();
  state.selectedTargetIDs.clear();
  state.page = 1;
  // 重新渲染步骤三和四
  loadAndRenderStep3();
});

// 点击遮罩关闭弹层
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// 启动
init();
</script>
